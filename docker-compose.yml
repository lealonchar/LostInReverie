services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lost_in_reverie
      POSTGRES_USER: lir
      POSTGRES_PASSWORD: lir_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lir -d lost_in_reverie"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: src/BandPortal.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=lost_in_reverie;Username=lir;Password=lir_dev_password
      LostInReverie__AdminToken: dev-band-admin
    ports:
      - "5000:8080"
    volumes:
      - uploads:/app/App_Data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: src/BandPortal.Client
      args:
        VITE_API_BASE_URL: http://localhost:5000
        VITE_CURRENCY: MKD
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  uploads:
